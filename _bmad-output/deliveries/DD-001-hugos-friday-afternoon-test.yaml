delivery:
  id: DD-001
  name: "Hugo's Friday Afternoon Test"
  status: ready_for_handoff
  created: 2026-05-21
  designer: Denis
  scenario: "01-hugos-friday-afternoon-test"

user_value:
  problem: >
    ML researchers waste entire afternoons rewriting infrastructure to adapt World Models
    to new environments. Hugo's custom pipeline is failing. He needs a credible, immediately
    usable adaptation layer that works in the Friday afternoon slot he has available.
  solution: >
    PhysLink provides a 5-step Colab path: GitHub README → Setup + physlink doctor →
    Universal Space API configuration → DreamerV3 adaptation loop → Validation result.
    Hugo goes from README to working validation result in < 90 minutes without touching
    his own codebase.
  success_criteria:
    - Hugo clicks "Open in Colab" from README within 90 seconds
    - physlink doctor returns GO in < 30 seconds of notebook work
    - Adaptation loop completes with a valid triptych result (imagination / real / difference)
    - Time-to-science callout confirms Hugo finished within his Friday afternoon window
    - Hugo shares the result URL (social proof trigger)

design_artifacts:
  scenarios:
    - path: "C-UX-Scenarios/01-hugos-friday-afternoon-test/1.1-github-readme/1.1-github-readme.md"
      description: "GitHub README — Hugo's 90-second trust filter"
    - path: "C-UX-Scenarios/01-hugos-friday-afternoon-test/1.2-colab-setup/1.2-colab-setup.md"
      description: "Colab Setup + physlink doctor — GO/NO-GO diagnostics"
    - path: "C-UX-Scenarios/01-hugos-friday-afternoon-test/1.3-colab-configuration/1.3-colab-configuration.md"
      description: "Universal Space API — configuration moment of truth"
    - path: "C-UX-Scenarios/01-hugos-friday-afternoon-test/1.4-colab-adaptation-loop/1.4-colab-adaptation-loop.md"
      description: "Adaptation loop — DreamerV3 fit + debug hooks + checkpointing"
    - path: "C-UX-Scenarios/01-hugos-friday-afternoon-test/1.5-colab-validation/1.5-colab-validation.md"
      description: "Validation result — triptych, metrics, export, sharing"
  design_system: none
  key_objects:
    - readme-action-open-colab-button
    - colab-setup-report-go-verdict
    - colab-config-summary-code-cell
    - colab-loop-fit-code-cell
    - colab-loop-monitor-progress-bar
    - colab-validation-triptych-imagination-panel
    - colab-validation-time-friday-callout

technical_requirements:
  platform: Google Colab (public notebook, T4 GPU runtime)
  language: Python 3.10+
  package: physlink (pip install physlink)
  integrations:
    - GitHub (README, badges, Colab link)
    - shields.io (CI, license, arXiv badges)
    - Google Colab runtime (GPU detection, cell execution)
  api_surface:
    - physlink.doctor() → diagnostic table
    - ObservationSpace.from_proprioception(joints, include_velocity)
    - ActionSpace.continuous(dims, bounds)
    - DreamerV3Adapter(obs, act)
    - adapter.fit(trajectories, steps, checkpoint_every)
    - adapter.visualize(trajectories)
    - adapter.export(path)
  performance:
    - physlink doctor: < 15 seconds
    - Pip install: < 60 seconds on Colab
    - Adaptation loop (quickstart): < 45 minutes on T4 GPU
    - Triptych render: < 10 seconds

acceptance_criteria:
  functional:
    - physlink.doctor() outputs a structured table covering Python, PyTorch, CUDA, VRAM, session estimate
    - GO verdict displayed as green callout when all checks pass
    - NO-GO verdict displays actionable fix for each failed check
    - ObservationSpace and ActionSpace validate types and dimensions immediately on creation
    - adapter.fit() streams progress (step count, ETA, prediction health, throughput)
    - Debug hooks panel is toggleable and shows pipeline stage statuses
    - Checkpoint is auto-saved every N steps; checkpoint path is printed
    - Triptych renders three synchronized GIF panels (imagination / real / difference)
    - Time-to-science callout shows elapsed time vs "traditional approach" baseline
    - adapter.export() produces artifact list (GIF, YAML, summary)
    - Share panel copies notebook URL to clipboard
  non_functional:
    - README loads in < 2 seconds on GitHub
    - All Colab cells are idempotent (safe to re-run)
    - Checkpoint recovery works on Colab session disconnect
    - physlink doctor output is readable without color (uses [OK]/[WARN]/[FAIL] labels)
  edge_cases:
    - CPU-only runtime → NO-GO with clear GPU upgrade instruction
    - Session timeout mid-adaptation → checkpoint recovery path visible
    - Low VRAM (< 4 GB) → warning with memory optimization suggestion
    - Zero valid trajectories → immediate error before fit() begins

open_questions:
  - "Is CPU-only demo mode supported? (1.2 open question)"
  - "What is the exact Colab notebook URL and GitHub org at launch?"
  - "Final physlink doctor thresholds for VRAM and Python version"

complexity:
  size: L
  effort_estimate: "3-4 weeks (Python package + Colab notebook + README)"
  risk: medium
  risk_rationale: "Colab runtime environment is external and changes periodically. GPU availability is not guaranteed."
  dependencies:
    - DreamerV3 adapter implementation
    - physlink doctor runtime detection logic
    - Universal Space API (ObservationSpace / ActionSpace)
    - Checkpoint / export utilities
