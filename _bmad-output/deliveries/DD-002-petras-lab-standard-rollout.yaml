delivery:
  id: DD-002
  name: "Petra's Lab Standard Rollout"
  status: ready_for_handoff
  created: 2026-05-21
  designer: Denis
  scenario: "02-petras-lab-standard-rollout"

user_value:
  problem: >
    Post-docs evaluating open-source tools for lab adoption must satisfy an institutional
    trust filter before recommending to their PI. Petra needs to confirm license clarity,
    maintenance health, scientific authority, lab-scale features, and community governance
    — all before writing her recommendation memo to Paula.
  solution: >
    PhysLink's GitHub README, CHANGELOG, arXiv paper, Lab Adoption Guide, and GitHub
    templates together form a complete institutional trust signal. Each artifact answers
    a specific Petra question in a predictable scan order.
  success_criteria:
    - Petra completes her full evaluation across 5 pages
    - She finds MIT license badge, active CHANGELOG, arXiv citation, AdaptationJobs API, and PR templates
    - She writes a GO recommendation memo for Paula with arXiv citation + Lab Adoption Guide URL
    - Time from README to memo: < 1 working day

design_artifacts:
  scenarios:
    - path: "C-UX-Scenarios/02-petras-lab-standard-rollout/2.1-github-readme/2.1-github-readme.md"
      description: "GitHub README — Petra's institutional scan (license → arXiv → maintenance → CHANGELOG)"
    - path: "C-UX-Scenarios/02-petras-lab-standard-rollout/2.2-changelog/2.2-changelog.md"
      description: "CHANGELOG — Keep a Changelog format, breaking change pattern, maintenance signal"
    - path: "C-UX-Scenarios/02-petras-lab-standard-rollout/2.3-arxiv-paper/2.3-arxiv-paper.md"
      description: "arXiv paper — MOMENT OF TRUTH. Credential audit (Petra) + domain vocabulary (Samuel)"
    - path: "C-UX-Scenarios/02-petras-lab-standard-rollout/2.4-lab-adoption-guide/2.4-lab-adoption-guide.md"
      description: "Lab Adoption Guide — AdaptationJobs, buffer sharing, onboarding, BibTeX citation"
    - path: "C-UX-Scenarios/02-petras-lab-standard-rollout/2.5-github-templates/2.5-github-templates.md"
      description: "GitHub templates — PR template (CHANGELOG checkbox), bug/feature/domain issue templates"
  design_system: none
  key_objects:
    - readme-repository-license-badge
    - readme-repository-maintenance-badge
    - readme-repository-arxiv-badge
    - readme-action-lab-path-link
    - changelog-release-entry-header
    - changelog-breaking-change-callout
    - arxiv-paper-affiliations
    - arxiv-section-physical-invariants
    - arxiv-citation-block
    - guide-adaptationjobs-section
    - guide-buffer-sharing-section
    - templates-pr-checklist
    - templates-issue-domain

technical_requirements:
  platform: GitHub (README, file views, issue templates) + arXiv + documentation site (MkDocs/ReadTheDocs)
  content_only: true
  note: >
    PhysLink controls CONTENT on GitHub and the documentation site only.
    GitHub/arXiv control the page structure and rendering.
  required_files:
    - README.md (with maintenance badge, dual-path action bar, lab adoption guide link)
    - CHANGELOG.md (Keep a Changelog format, ≥ 3 dated releases, ⚠️ Breaking pattern)
    - arXiv paper (affiliations, Physical Invariants section, benchmark table, GitHub link in abstract)
    - docs/lab-adoption-guide.md (AdaptationJobs, buffer sharing, BibTeX)
    - .github/PULL_REQUEST_TEMPLATE.md (CHANGELOG checkbox, tests checkbox)
    - .github/ISSUE_TEMPLATE/bug_report.md
    - .github/ISSUE_TEMPLATE/feature_request.md
    - .github/ISSUE_TEMPLATE/domain_extension.md (optional but strongly recommended)
  api_surface:
    - AdaptationJob(config, name) → job.run()
    - TrajectoryBuffer.export(path)
    - TrajectoryBuffer.load(path)

acceptance_criteria:
  functional:
    - MIT license badge present and links to LICENSE file
    - Maintenance badge (shields.io latest release) shows a recent version
    - arXiv badge links to the position paper
    - README action bar includes "Evaluate for your lab →" path
    - CHANGELOG has ≥ 3 releases with ISO dates and human-readable descriptions
    - CHANGELOG breaking changes use ⚠️ **Breaking:** pattern with > **Migration:** note
    - arXiv paper abstract contains quantified result + "physical invariants" language
    - arXiv paper has a Physical Invariants section with a worked example
    - Lab Adoption Guide has AdaptationJob named run code example
    - Lab Adoption Guide has buffer sharing export/load code examples
    - Lab Adoption Guide has a BibTeX citation block
    - PR template checklist includes "CHANGELOG updated" checkbox
    - PR template checklist includes "Tests pass" checkbox
    - ≥ 2 issue templates exist (bug + feature)
  non_functional:
    - CHANGELOG is maintained incrementally (not batch-updated at release)
    - README badges reflect live CI/version status (not hardcoded)
  edge_cases:
    - CHANGELOG absent → hard NO-GO for Petra
    - arXiv paper has no GitHub link → Samuel cannot exit to README
    - Domain extension template absent → Samuel has no community return channel

open_questions:
  - "Should dual-path action bar be implemented? (README discoverability open question 2.1 Q1)"
  - "Will domain_extension.md issue template ship before first lab outreach? (2.5 Q1)"
  - "Should PR checklist include physical invariants checkbox? (2.5 Q2)"

complexity:
  size: M
  effort_estimate: "1-2 weeks (content authoring: README, CHANGELOG, docs, templates)"
  risk: low
  risk_rationale: "Content-only work on third-party platforms. Main risk is arXiv submission timeline."
  dependencies:
    - arXiv paper submission (external dependency, may block Petra scenario entirely)
    - Lab Adoption Guide documentation site setup
    - DD-001 (physlink package must exist before CHANGELOG has meaningful entries)
