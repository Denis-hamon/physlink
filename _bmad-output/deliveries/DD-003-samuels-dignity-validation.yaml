delivery:
  id: DD-003
  name: "Samuel's Dignity Validation"
  status: ready_for_handoff
  created: 2026-05-21
  designer: Denis
  scenario: "03-samuels-dignity-validation"

user_value:
  problem: >
    Domain scientists (CFD, structural mechanics, climate) fear "physical hallucinations"
    — ML outputs that look reasonable but violate the laws of physics they have spent
    years studying. Samuel needs proof that PhysLink cannot produce physically invalid
    trajectories before he will trust or adopt it.
  solution: >
    A dedicated "Getting Started for Domain Scientists" documentation page acknowledges
    the physical hallucinations fear by name, then shows the register_invariant() API
    with a mass conservation worked example. A companion Colab notebook lets Samuel
    plug in his own CFD data and run compliance validation to get a PASS result
    (violations=0/N) with a compliance histogram.
  success_criteria:
    - Samuel finds the "For Domain Scientists" entry point from README in < 10 seconds
    - 3.3 philosophy section names "physical hallucinations" explicitly — Samuel feels acknowledged
    - Samuel registers mass_conservation invariant using register_invariant() with mode="hard"
    - Colab Cell 5 outputs mass_conservation: PASS (violations=0/N) on Samuel's CFD data
    - Samuel opens a GitHub Domain Extension issue OR shares the arXiv link (community return)

design_artifacts:
  scenarios:
    - path: "C-UX-Scenarios/03-samuels-dignity-validation/3.1-arxiv-paper/3.1-arxiv-paper.md"
      description: "arXiv paper — Samuel's cold discovery scan (delta spec from 2.3)"
    - path: "C-UX-Scenarios/03-samuels-dignity-validation/3.2-github-readme/3.2-github-readme.md"
      description: "GitHub README — Samuel's 10-second single-goal scan (delta spec from 1.1)"
    - path: "C-UX-Scenarios/03-samuels-dignity-validation/3.3-getting-started-domain/3.3-getting-started-domain.md"
      description: "Getting Started for Domain Scientists — MOMENT OF TRUTH. Philosophy + register_invariant() API"
    - path: "C-UX-Scenarios/03-samuels-dignity-validation/3.4-colab-validation/3.4-colab-validation.md"
      description: "Colab validation — 8-cell notebook, CFD data plug-in, compliance report + histogram"
  design_system: none
  key_objects:
    - readme-links-domain-scientists-link
    - domain-philosophy-section
    - domain-fear-acknowledgement-callout
    - domain-api-register-invariant
    - domain-api-params-table
    - domain-compliance-report
    - domain-compliance-histogram
    - domain-colab-cta-button
    - colab-domain-cell-3-data-input
    - colab-domain-cell-5-compliance-output
    - colab-domain-cell-6-histogram
    - colab-domain-cell-8-whats-next

technical_requirements:
  platform: Documentation site (3.3) + Google Colab public notebook (3.4)
  language: Python 3.10+
  api_surface:
    - register_invariant(adapter, name, fn, tolerance, mode) → adapter
      - adapter: DreamerV3Adapter instance
      - name: str — human-readable invariant name
      - fn: Callable[[dict], float] — returns residual (0.0 = perfect compliance)
      - tolerance: float — max acceptable residual
      - mode: "hard" | "soft" — hard rejects invalid trajectories; soft penalizes them
    - adapter.compliance_report() → ComplianceReport
    - report.summary() → str — "name: PASS (max_residual=X, threshold=Y, violations=Z/N)"
    - report.violations() → list[ViolationDetail] — human-readable failure details
    - report.plot(title, show_threshold) → matplotlib inline histogram
    - report.export(path) → JSON file
  performance:
    - compliance_report() on 1000 trajectories: < 30 seconds
    - report.plot(): renders inline in Colab < 5 seconds
  content_requirements:
    - 3.3 must contain the "physical hallucinations" acknowledgement paragraph verbatim
    - 3.3 must show mass_conservation worked example with fn, register_invariant call, and PASS output
    - Colab Cell 3 must have prominent ⚠️ "Edit this cell" instruction

acceptance_criteria:
  functional:
    - readme-links-domain-scientists-link exists and navigates to 3.3
    - 3.3 philosophy section uses the phrase "physical hallucinations" and explains the concept
    - register_invariant() accepts fn as a plain Python callable (no subclasses or decorators required)
    - mode="hard" causes compliance validation to reject trajectories where residual > tolerance
    - mode="soft" logs a penalty but does not reject trajectories
    - report.summary() format: "name: PASS (max_residual=X, threshold=Y, violations=Z/N)"
    - report.violations() output identifies the trajectory index, field values, residual, and possible cause
    - report.plot() renders a histogram with a vertical threshold line
    - report.export() produces a JSON file readable by external tools
    - Colab Cell 8 "What's next?" links to Domain Extension GitHub issue template
  non_functional:
    - register_invariant() can be called multiple times to register multiple invariants
    - Compliance check is deterministic (same data → same result)
    - Cell 3 data format is documented with a concrete CFD example (mass_flow_in / mass_flow_out)
  edge_cases:
    - All trajectories FAIL → violations list shows first N with actionable cause text
    - tolerance=0.0 → any non-zero residual triggers violation
    - fn raises an exception → ComplianceReport marks the invariant as ERROR with traceback

open_questions:
  - "Should 'For Domain Scientists' link appear in README Fast Action Bar? (3.2 Q1)"
  - "Should a 'Who is this for?' grid section be added above Deep Trust Links? (3.2 Q2)"
  - "What physical domains beyond robotics are explicitly listed in 3.3? (3.3 Q1)"
  - "Should 3.3 show register_invariant for multiple invariants simultaneously? (3.3 Q2)"

complexity:
  size: M
  effort_estimate: "2-3 weeks (compliance API + domain Colab notebook + 3.3 documentation page)"
  risk: medium
  risk_rationale: >
    The compliance validation API (register_invariant + ComplianceReport) is new surface area
    not in DD-001. Domain scientist Colab notebook requires real CFD test data for validation.
    README discoverability (3.2 Q1) is an unresolved design tension that may require README
    redesign overlapping with DD-001/DD-002.
  dependencies:
    - DD-001 (DreamerV3Adapter must exist before register_invariant() can be tested)
    - DD-002 (readme-links-domain-scientists-link must exist in README)
    - .github/ISSUE_TEMPLATE/domain_extension.md (from DD-002)
