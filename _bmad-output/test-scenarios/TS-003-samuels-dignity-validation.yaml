test_scenario:
  id: TS-003
  delivery_id: DD-003
  name: "Samuel's Dignity Validation — Validation"
  status: draft
  created: 2026-05-21
  objectives:
    - Verify the "For Domain Scientists" README link is discoverable in < 10 seconds
    - Confirm 3.3 philosophy section acknowledges "physical hallucinations" explicitly
    - Validate register_invariant() API with mass conservation example produces PASS
    - Verify compliance report, histogram, and export work correctly

happy_path:
  - name: "Samuel finds domain entry point in < 10 seconds"
    steps:
      - 1. Open GitHub README on desktop (1440px monitor)
      - 2. Scan for 'For Domain Scientists' link without scrolling
    expected:
      - "readme-links-domain-scientists-link is visible in the first 2 viewports"
      - "Click navigates to Getting Started for Domain Scientists page"
    spec: "3.2-github-readme"

  - name: "3.3 philosophy section acknowledges Samuel's fear"
    steps:
      - 1. Open Getting Started for Domain Scientists
      - 2. Read the first section before any code
    expected:
      - "Section contains the phrase 'physical hallucinations'"
      - "Section explains that PhysLink makes physical hallucinations impossible"
      - "Section appears BEFORE any API documentation"
    spec: "3.3-getting-started-domain"

  - name: "register_invariant() with mass conservation returns PASS"
    steps:
      - 1. Open 3.3 documentation
      - 2. Copy mass_conservation function definition
      - 3. Call register_invariant(adapter, 'mass_conservation', mass_conservation, 1e-3, 'hard')
      - 4. Run compliance_report().summary()
    expected:
      - "Output: 'mass_conservation: PASS (max_residual=X, threshold=0.001, violations=0/N)'"
    spec: "3.3-getting-started-domain"

  - name: "Colab notebook: Samuel's CFD data produces compliance PASS"
    steps:
      - 1. Open Domain Scientists Colab notebook
      - 2. Run Cells 1–2 (install + imports)
      - 3. Replace example_trajectories in Cell 3 with CFD data
      - 4. Run Cell 4 (register invariant)
      - 5. Run Cell 5 (compliance report)
      - 6. Run Cell 6 (histogram)
      - 7. Run Cell 7 (export)
    expected:
      - "Cell 3 has prominent ⚠️ 'Edit this cell' instruction"
      - "Cell 5 output: 'mass_conservation: PASS (violations=0/N)'"
      - "Cell 6 renders inline histogram with threshold line"
      - "Cell 7 creates compliance_report.json"
    spec: "3.4-colab-validation"

  - name: "Community return: Cell 8 links to Domain Extension issue"
    steps:
      - 1. Read Cell 8 'What's next?' markdown
      - 2. Click GitHub Domain Extension issue template link
    expected:
      - "Link navigates to .github/ISSUE_TEMPLATE/domain_extension.md on GitHub"
      - "Issue template has Physical domain / Invariants / Paper / Contribution fields"
    spec: "3.4-colab-validation"

error_states:
  - trigger: "All trajectories FAIL compliance"
    expected:
      - "report.violations() lists each failure with: trajectory index, field values, residual, possible cause"
      - "Possible cause text is human-readable (not a stack trace)"

  - trigger: "fn raises a Python exception inside register_invariant"
    expected: "ComplianceReport marks the invariant as ERROR with a traceback in the report"

  - trigger: "mode='hard' trajectory with residual > tolerance"
    expected: "Trajectory is rejected and does not appear in the adapted model output"

edge_cases:
  - scenario: "Multiple invariants registered (mass + momentum)"
    expected: "report.summary() shows a row per invariant; all must PASS for overall PASS"

  - scenario: "tolerance=0.0 with floating point data"
    expected: "Clear documentation that tolerance=0.0 is only suitable for integer/exact data"

  - scenario: "'For Domain Scientists' link is below the fold on 1440px"
    expected: "DESIGN BLOCKER — open question 3.2 Q1 must be resolved before this test can pass"

design_system_validation:
  note: "design_system_mode=none"
  checks:
    - "Philosophy section is visually distinct from API documentation (heading level, spacing)"
    - "register_invariant() parameter table is readable (4-column: param / type / description / example)"
    - "Compliance histogram threshold line is clearly labeled"
    - "PASS callout is visually distinct from FAIL callout"

accessibility:
  - "Philosophy section uses plain language (no ML jargon in the first paragraph)"
  - "Code blocks have copy-accessible formatting"
  - "Compliance report output is readable as plain text (not color-coded only)"

sign_off:
  pass_threshold: "All happy path tests pass; README discoverability open question resolved"
  must_fix:
    - "readme-links-domain-scientists-link absent from README"
    - "'physical hallucinations' phrase absent from 3.3 philosophy section"
    - "register_invariant() does not accept plain Python callables"
    - "compliance_report().summary() format does not match spec"
  nice_to_fix:
    - "Compliance histogram aesthetic polish"
    - "Cell 8 'What's next?' link wording"
  blocked_by:
    - "3.2 Q1: README Fast Action Bar entry point for Samuel — MUST be resolved before testing step 1"
  approver: Denis
